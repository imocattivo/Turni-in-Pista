<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Turni in Pista</title>
<link rel="manifest" href="manifest.json">
<style>
body {
    margin: 0;
    background: #111;
    color: #fff;
    font-family: Arial, sans-serif;
    overflow-x: hidden;
}

/* MENU LATERALE */
#sideMenu {
    position: fixed;
    top: 0;
    left: -260px;
    width: 260px;
    height: 100%;
    background: #000;
    border-right: 3px solid #ffcc00;
    padding: 20px;
    transition: 0.3s;
    z-index: 10000;
}
#sideMenu.open { left: 0; }

#sideMenu h2 {
    color: #ffcc00;
    margin-top: 0;
}

.menuBtn {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    background: #ffcc00;
    color: #000;
    border: none;
    font-size: 18px;
    font-weight: bold;
    border-radius: 6px;
}

/* MENU BUTTON IN ALTO A DESTRA */
#menuBtn {
    position: fixed;
    top: 10px;
    right: 10px;
    background: #000;
    color: #ffcc00;
    padding: 8px 14px;
    font-size: 18px;
    border: 2px solid #ffcc00;
    border-radius: 8px;
    font-weight: bold;
    cursor: pointer;
    z-index: 10001;
}

/* PULSANTI IN BASSO */
#bottomBar {
    position: fixed;
    bottom: 10px;
    width: 100%;
    text-align: center;
    z-index: 10001;
}

.bottomBtn {
    background: #ffcc00;
    color: #000;
    padding: 14px 22px;
    margin: 0 10px;
    font-size: 22px;
    border: none;
    border-radius: 10px;
    font-weight: bold;
}
</style>
</head>

<body>

<!-- MENU LATERALE -->
<div id="sideMenu">
    <h2>Menu</h2>
    <button class="menuBtn">Nuova Gara</button>
    <button class="menuBtn">Carica Gara</button>
    <button class="menuBtn">Salva Gara</button>
    <button class="menuBtn">Impostazioni</button>
    <button class="menuBtn">Info</button>
</div>

<!-- PULSANTE MENU IN ALTO A DESTRA -->
<button id="menuBtn">☰ Menu</button>

<!-- PULSANTI IN BASSO -->
<div id="bottomBar">
    <button id="superBtn" class="bottomBtn">SuperVis</button>
    <button id="fullscreenBtn" class="bottomBtn">Fullscreen</button>
</div>

<script>
// MENU LATERALE
const menu = document.getElementById("sideMenu");
document.getElementById("menuBtn").onclick = () => {
    menu.classList.toggle("open");
};

// FULLSCREEN
document.getElementById("fullscreenBtn").onclick = () => {
    if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen();
    } else {
        document.exitFullscreen();
    }
};

// SUPERVIS (solo placeholder)
document.getElementById("superBtn").onclick = () => {
    alert("SuperVis attivato");
};
</script>

</body>
</html>
